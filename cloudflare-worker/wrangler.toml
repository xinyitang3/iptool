# Cloudflare Workers 配置文件
# 使用 Wrangler CLI 部署

name = "cfnb-ip-subscribe"
main = "worker.js"
compatibility_date = "2024-01-01"

# 路由配置（可选）
# 如果需要绑定自定义域名，取消下面的注释并修改
# routes = [
#   { pattern = "ip.yourdomain.com", zone_name = "yourdomain.com" }
# ]

# 环境变量配置（可选）
# [env.production]
# name = "cfnb-ip-subscribe-prod"

# KV 命名空间（如果需要持久化缓存）
# [[kv_namespaces]]
# binding = "IP_CACHE"
# id = "your-kv-namespace-id"

# 环境变量
[vars]
GITHUB_RAW_URL = "https://raw.githubusercontent.com/qq547475331/cfnb/main/ip.txt"
CACHE_MAX_AGE = "300"